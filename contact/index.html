  <style>
    /* Contact page — clean, mobile-first */
    .contact-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      max-width: 640px;
      margin: 0 auto;
    }
    /* Form card */
    .contact-form-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px;
      box-shadow: var(--shadow);
    }
    @media (max-width: 480px) {
      .contact-form-card { padding: 24px 16px; }
    }
    /* All inputs 16px to prevent iOS zoom */
    .contact-form-card input,
    .contact-form-card select,
    .contact-form-card textarea {
      font-size: 16px !important;
      min-height: 48px;
    }
    .contact-form-card textarea { min-height: 100px; }
    /* Name + phone side by side on tablet+, stacked on mobile */
    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 540px) {
      .form-row-2 { grid-template-columns: 1fr; }
    }
    /* Info strip below form */
    .contact-info-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 28px 0 8px;
      border-top: 1px solid var(--border);
    }
    .contact-info-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }
    .contact-info-item .icon {
      width: 36px; height: 36px;
      background: rgba(201,168,76,0.1);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .contact-info-item a, .contact-info-item span { color: var(--navy); font-weight: 500; }
    .contact-info-item a:hover { color: var(--gold); }
  </style>
